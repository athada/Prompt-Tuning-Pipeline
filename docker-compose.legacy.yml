version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: prompt-tuning-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
    ports:
      - "${MONGODB_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - prompt-tuning-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Temporal Server (with auto-setup)
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: prompt-tuning-temporal
    restart: unless-stopped
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "${TEMPORAL_PORT}:7233"
    depends_on:
      temporal-postgres:
        condition: service_healthy
    networks:
      - prompt-tuning-network
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Temporal PostgreSQL Database
  temporal-postgres:
    image: postgres:15-alpine
    container_name: prompt-tuning-temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    networks:
      - prompt-tuning-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Temporal Web UI
  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: prompt-tuning-temporal-ui
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "${TEMPORAL_WEB_PORT}:8080"
    depends_on:
      - temporal
    networks:
      - prompt-tuning-network

  # API & Worker Service
  api-worker:
    build:
      context: ./api-worker
      dockerfile: Dockerfile
    container_name: prompt-tuning-api-worker
    restart: unless-stopped
    env_file:
      - ./api-worker/.env
    ports:
      - "${API_PORT}:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - prompt-tuning-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Frontend UI
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: prompt-tuning-ui
    restart: unless-stopped
    env_file:
      - ./ui/.env
    ports:
      - "${UI_PORT}:3000"
    depends_on:
      - api-worker
    networks:
      - prompt-tuning-network
    environment:
      - VITE_API_BASE_URL=http://localhost:${API_PORT}

volumes:
  mongodb_data:
    driver: local
  temporal_postgres_data:
    driver: local

networks:
  prompt-tuning-network:
    driver: bridge
